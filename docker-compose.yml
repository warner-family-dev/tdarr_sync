services:
  worker:
    build:
      context: .
      dockerfile: docker/tdarr.Dockerfile
    command: ["python", "-m", "services.worker"]
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      STATE_DB_FILE: ${STATE_DB_FILE:-/data/sonarr_tdarr_state.db}
      LOG_FILE: ${LOG_FILE:-/logs/tdarr_sync.log}
    volumes:
      - ${HOST_LIBRARY_MOUNT}:/media/library
      - ${HOST_TDARR_INPUT}:/media/tdarr/input
      - ${HOST_TDARR_OUTPUT}:/media/tdarr/output
      - ${HOST_ARCHIVE_DIR:-./archive}:/media/archive
      - ${TDARR_SYNC_DATA_DIR:-./data}:/data
      - ${TDARR_SYNC_LOG_DIR:-./logs}:/logs
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/tdarr.Dockerfile
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      STATE_DB_FILE: ${STATE_DB_FILE:-/data/sonarr_tdarr_state.db}
      LOG_FILE: ${LOG_FILE:-/logs/tdarr_sync.log}
      SYNC_SCRIPT_PATH: ${SYNC_SCRIPT_PATH:-/app/tdarr_sync.py}
      SYNC_PYTHON_EXECUTABLE: ${SYNC_PYTHON_EXECUTABLE:-python}
    volumes:
      - ${HOST_LIBRARY_MOUNT}:/media/library
      - ${HOST_TDARR_INPUT}:/media/tdarr/input
      - ${HOST_TDARR_OUTPUT}:/media/tdarr/output
      - ${HOST_ARCHIVE_DIR:-./archive}:/media/archive
      - ${TDARR_SYNC_DATA_DIR:-./data}:/data
      - ${TDARR_SYNC_LOG_DIR:-./logs}:/logs
    depends_on:
      worker:
        condition: service_started
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://api:8000}
      TZ: ${TZ}
      LOG_FILE: ${LOG_FILE:-/logs/tdarr_sync.log}
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped
    volumes:
      - ${TDARR_SYNC_LOG_DIR:-./logs}:/logs
