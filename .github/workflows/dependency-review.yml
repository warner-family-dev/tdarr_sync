name: Dependency review

on:
  pull_request:
    branches:
      - main
      - "dev/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency_review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: high
          license-check: true
          vulnerability-check: true
          allow-dependencies-licenses: >-
            pkg:githubactions/actions/setup-node,
            pkg:githubactions/aquasecurity/trivy-action,
            pkg:pypi/fastapi,
            pkg:pypi/starlette
