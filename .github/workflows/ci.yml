name: CI

on:
  pull_request:
    branches:
      - main
      - "dev/**"
  push:
    branches:
      - main
      - "dev/**"

permissions:
  contents: read

jobs:
  quality:
    name: Tests, builds, and dependency audits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/base.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.9.0"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Python check dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/base.txt ruff pytest pip-audit bandit

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Validate Git whitespace
        run: git diff --check

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q

      - name: Audit Python dependencies
        run: pip-audit -r requirements/base.txt

      - name: Bandit
        run: >-
          bandit -q -ll -ii -r
          api services tdarr_sync.py runtime_settings.py sync_progress.py

      - name: Frontend lint
        working-directory: web
        run: npm run lint

      - name: Frontend production build
        working-directory: web
        run: npm run build

      - name: Audit frontend production dependencies
        working-directory: web
        run: npm audit --omit=dev --audit-level=high

  dependency_review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: high

  secret_scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Scan repository history for secrets
        run: >-
          docker run --rm
          -v "$PWD:/repo"
          zricethezav/gitleaks:v8.30.1
          detect --source=/repo --no-git --redact --verbose

  container_scan:
    name: Container vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build API image
        run: docker build -f docker/tdarr.Dockerfile -t tdarr-sync-api:ci .

      - name: Scan API image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: tdarr-sync-api:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Build web image
        run: docker build -f web/Dockerfile -t tdarr-sync-web:ci web

      - name: Scan web image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: tdarr-sync-web:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
